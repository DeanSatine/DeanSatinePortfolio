<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" type="image/png" href="./images/favicon.png" />
  <link rel="stylesheet" href="index.css" />
  <title>Arms Race! | Dean Satine</title>
  <meta name="description" content="Arms Race! — project details by Dean Satine, systems and gameplay designer.">
</head>

<body>

  <header class="project-header">
    <a href="index.html" class="project-header__logo-link">
      <img src="./images/DeanSatineLogo.png" alt="Dean Satine" class="project-header__logo">
    </a>
    <h1 class="heading-primary project-header__title">Arms Race!</h1>
    <img src="./images/ArmsRace.png" alt="Arms Race!" class="project-header__image">
    
  </header>

  <main role="main">
    <section class="project-details project-body">
      <div class="row">

        <div class="project-body__top">
          <div class="project-body__about">
            <h2>About the Project</h2>
            <p>Coming soon — details will be added when this project is ready to share.</p>
          </div>
          <div class="project-body__responsibilities">
            <h2>My Responsibilities</h2>
            <ul>
              <li>Game design</li>
              <li>Programming</li>
            </ul>
          </div>
        </div>

        <div class="project-body__media">
          
          <div class="project-body__gallery-section">
            <h2>Screenshots</h2>
            <div class="project-body__gallery">
              <div class="project-body__gallery-item" data-num="1">
                <img src="./images/armsrace-screen1.png" alt="Arms Race! Screenshot 1">
                <div class="project-body__gallery-overlay"><span>View ↗</span></div>
              </div>
              <div class="project-body__gallery-item" data-num="2">
                <img src="./images/armsrace-screen2.png" alt="Arms Race! Screenshot 2">
                <div class="project-body__gallery-overlay"><span>View ↗</span></div>
              </div>
              <div class="project-body__gallery-item" data-num="3">
                <img src="./images/armsrace-screen3.png" alt="Arms Race! Screenshot 3">
                <div class="project-body__gallery-overlay"><span>View ↗</span></div>
              </div>
            </div>
          </div>
        </div>

        <div class="project-body__back">
          <a href="projects.html" class="btn">&larr; Back to All Projects</a>
        </div>

      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="row">
      <p>&copy; 2026 &ndash; Dean Satine | Systems &amp; Gameplay Designer</p>
    </div>
  </footer>

  <div id="lightbox" class="lightbox">
    <span class="lightbox-close">&times;</span>
    <img class="lightbox-content" id="lightbox-img">
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function () {
      const lb    = document.getElementById('lightbox');
      const lbImg = document.getElementById('lightbox-img');
      const close = document.querySelector('.lightbox-close');
      if (!lb) return;

      document.querySelectorAll('.project-body__gallery-item').forEach(item => {
        item.addEventListener('click', () => {
          lbImg.src = item.querySelector('img').src;
          lb.classList.add('active');
        });
      });

      const closeLb = () => lb.classList.remove('active');
      close.addEventListener('click', closeLb);
      lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLb(); });
    });
  </script>

</body>
</html>
